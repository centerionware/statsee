<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StatSee Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {background:#121212;color:#fff;font-family:sans-serif;}
.card {background:#1f1f1f;border-radius:0.75rem;padding:1rem;margin:1rem;}
button {background:#3b82f6;color:white;font-weight:bold;padding:0.5rem 1rem;border-radius:0.5rem;cursor:pointer;}
</style>
</head>
<body class="min-h-screen p-4">
<h1 class="text-3xl font-bold mb-4">StatSee Dashboard</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <div class="card">
    <h2 class="text-xl font-semibold mb-2">CPU Load</h2>
    <canvas id="cpuChart" height="300"></canvas>
  </div>

  <div class="card">
    <h2 class="text-xl font-semibold mb-2">RAM Usage (MB)</h2>
    <canvas id="ramChart" height="300"></canvas>
  </div>

  <div class="card">
    <h2 class="text-xl font-semibold mb-2">Disk I/O (MB)</h2>
    <canvas id="diskChart" height="300"></canvas>
  </div>

  <div class="card">
    <h2 class="text-xl font-semibold mb-2">Network Traffic (eth0)</h2>
    <div id="netTotals" class="mb-2 text-lg font-bold text-gray-300">Loading network totals...</div>
    <canvas id="netChart" height="300"></canvas>
  </div>

  <div class="card md:col-span-2 flex flex-col items-start">
    <h2 class="text-xl font-semibold mb-2">Speed Test</h2>
    <button id="startSpeedBtn">Run Speed Test</button>
    <canvas id="speedChart" height="300" class="mt-4 w-full"></canvas>
    <div id="speedResult" class="mt-2 text-lg"></div>
  </div>

</div>

<script>
let ws = new WebSocket(`ws://${location.host}/ws`);

// CPU
const cpuChart = new Chart(document.getElementById('cpuChart').getContext('2d'), {
	type:'line',
	data:{labels:[],datasets:[{label:'CPU %',data:[],borderColor:'red',fill:false}]},
	options:{animation:false,scales:{y:{min:0,max:100}}}
});

// RAM
const ramChart = new Chart(document.getElementById('ramChart').getContext('2d'), {
	type:'line',
	data:{labels:[],datasets:[{label:'Used MB',data:[],borderColor:'orange',fill:false},{label:'Free MB',data:[],borderColor:'green',fill:false}]},
	options:{animation:false,scales:{y:{min:0}}}
});

// Disk
const diskChart = new Chart(document.getElementById('diskChart').getContext('2d'), {
	type:'line',
	data:{labels:[],datasets:[{label:'Read MB',data:[],borderColor:'cyan',fill:false},{label:'Write MB',data:[],borderColor:'magenta',fill:false}]},
	options:{animation:false,scales:{y:{min:0}}}
});

// Network
const netChart = new Chart(document.getElementById('netChart').getContext('2d'), {
	type:'line',
	data:{labels:[],datasets:[{label:'Ingress MB/s',data:[],borderColor:'lime',fill:false},{label:'Egress MB/s',data:[],borderColor:'yellow',fill:false}]},
	options:{animation:false,scales:{y:{min:0}}}
});

// Speed Test
const speedChart = new Chart(document.getElementById('speedChart').getContext('2d'), {
	type:'doughnut',
	data:{labels:['Download','Upload'],datasets:[{label:'Speed Test',data:[0,0],backgroundColor:['blue','red']}]},
	options:{responsive:true,plugins:{legend:{position:'bottom'}}}
});

async function loadNetworkTotals(){
  try{
    let res = await fetch('/api/network-totals');
    let totals = await res.json();
    let txt='';
    for(let iface in totals){
      txt+=`<b>${iface}</b>: Today: ${totals[iface].daily_in.toFixed(2)}GB in / ${totals[iface].daily_out.toFixed(2)}GB out, Month: ${totals[iface].monthly_in.toFixed(2)}GB in / ${totals[iface].monthly_out.toFixed(2)}GB out<br>`;
    }
    document.getElementById('netTotals').innerHTML=txt;
  }catch(e){console.error(e);}
}
loadNetworkTotals();
setInterval(loadNetworkTotals,3000);

ws.onmessage = e=>{
	let msg=JSON.parse(e.data);
	const ts=new Date().toLocaleTimeString();

	if(msg.type==='stats'){
		// CPU
		cpuChart.data.labels.push(ts);
		cpuChart.data.datasets[0].data.push(msg.cpu);
		if(cpuChart.data.labels.length>30){cpuChart.data.labels.shift();cpuChart.data.datasets[0].data.shift();}
		cpuChart.update();

		// RAM
		ramChart.data.labels.push(ts);
		ramChart.data.datasets[0].data.push(msg.ram.used);
		ramChart.data.datasets[1].data.push(msg.ram.free);
		if(ramChart.data.labels.length>30){ramChart.data.labels.shift();ramChart.data.datasets[0].data.shift();ramChart.data.datasets[1].data.shift();}
		ramChart.update();

		// Disk
		let totalRead=0,totalWrite=0;
		for(let k in msg.disk){totalRead+=msg.disk[k].ReadBytes/1024/1024; totalWrite+=msg.disk[k].WriteBytes/1024/1024;}
		diskChart.data.labels.push(ts);
		diskChart.data.datasets[0].data.push(totalRead);
		diskChart.data.datasets[1].data.push(totalWrite);
		if(diskChart.data.labels.length>30){diskChart.data.labels.shift();diskChart.data.datasets[0].data.shift();diskChart.data.datasets[1].data.shift();}
		diskChart.update();

		// Network
		let totalIn=0,totalOut=0;
		for(let k in msg.net){totalIn+=msg.net[k].rate_recv; totalOut+=msg.net[k].rate_sent;}
		netChart.data.labels.push(ts);
		netChart.data.datasets[0].data.push(totalIn);
		netChart.data.datasets[1].data.push(totalOut);
		if(netChart.data.labels.length>30){netChart.data.labels.shift();netChart.data.datasets[0].data.shift();netChart.data.datasets[1].data.shift();}
		netChart.update();

	} else if(msg.type==='speedtest_update'){
		speedChart.data.datasets[0].data=[msg.download,msg.upload];
		speedChart.update();
	} else if(msg.type==='speedtest_done'){
		speedChart.data.datasets[0].data=[msg.download,msg.upload];
		speedChart.update();
		document.getElementById('speedResult').innerText=`Download: ${msg.download.toFixed(2)} MB/s, Upload: ${msg.upload.toFixed(2)} MB/s`;
	}
};

document.getElementById('startSpeedBtn').addEventListener('click',()=>{
	ws.send(JSON.stringify({type:'speedtest'}));
});
</script>
</body>
</html>
